name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Test (Rust stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test

  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rsplitcap
            asset-name: rsplitcap-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rsplitcap
            asset-name: rsplitcap-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rsplitcap.exe
            asset-name: rsplitcap-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  build-wheel:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.event_name == 'release'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --features python
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [build-cli, build-wheel]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Linux CLI
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-unknown-linux-gnu
          path: cli-tmp/linux
      - name: Download macOS CLI
        uses: actions/download-artifact@v4
        with:
          name: cli-aarch64-apple-darwin
          path: cli-tmp/macos
      - name: Download Windows CLI
        uses: actions/download-artifact@v4
        with:
          name: cli-x86_64-pc-windows-msvc
          path: cli-tmp/windows
      - name: Organize CLI binaries
        run: |
          mkdir -p release
          mv cli-tmp/linux/rsplitcap release/rsplitcap-linux-x86_64
          mv cli-tmp/macos/rsplitcap release/rsplitcap-macos-arm64
          mv cli-tmp/windows/rsplitcap.exe release/rsplitcap-windows-x86_64.exe
          ls -la release/
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheels
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
      - name: Publish wheels to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels/*.whl
